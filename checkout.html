<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault 96 Co. | Checkout</title>
    <link rel="stylesheet" href="site.css">
</head>
<body>
    <main class="page-wrapper">
        <section class="page-card">
            <div class="top-row">
                <a href="index.html" class="logo-link">VAULT 96<br>CO.</a>

                <nav class="top-nav">
                    <a href="products.html">shop</a>
                    <a href="about.html">about us</a>
                    <a href="contact.html">contact us</a>
                    <a href="custom-order.html">custom order form</a>
                    <a href="previous-works.html">previous works</a>
                    <a href="cart.html">cart <span id="cart-count" class="cart-count">0</span></a>
                </nav>
            </div>

            <section class="checkout-grid">
                <section class="checkout-box">
                    <h2>Checkout Information</h2>

                    <form id="checkout-form" class="form-stack">
                        <div class="form-group">
                            <label for="checkout-name">Full Name</label>
                            <input type="text" id="checkout-name" name="checkout-name" placeholder="Your full name">
                        </div>

                        <div class="form-group">
                            <label for="checkout-email">Email</label>
                            <input type="email" id="checkout-email" name="checkout-email" placeholder="Your email">
                        </div>

                        <div class="form-group">
                            <label for="checkout-address">Shipping Address</label>
                            <input type="text" id="checkout-address" name="checkout-address" placeholder="Street address">
                        </div>

                        <div class="two-column">
                            <div class="form-group">
                                <label for="checkout-city">City</label>
                                <input type="text" id="checkout-city" name="checkout-city" placeholder="City">
                            </div>

                            <div class="form-group">
                                <label for="checkout-zip">ZIP Code</label>
                                <input type="text" id="checkout-zip" name="checkout-zip" placeholder="ZIP code">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="checkout-card">Card Number</label>
                            <input type="text" id="checkout-card" name="checkout-card" placeholder="1234 5678 9012 3456">
                        </div>

                        <div id="checkout-message" class="form-message"></div>

                        <div class="button-row" style="justify-content:flex-start;">
                            <button type="submit" class="main-btn">Place Order</button>
                        </div>
                    </form>
                </section>

                <section class="order-box">
                    <h2>Your Order</h2>
                    <div id="checkout-order-items"></div>
                    <div id="checkout-order-totals" style="margin-top:18px;"></div>
                </section>
            </section>
        </section>
    </main>

    <script src="site.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault 96 Co. | Contact Us</title>
    <link rel="stylesheet" href="site.css">
</head>
<body>
    <main class="page-wrapper">
        <section class="page-card">
            <div class="top-row">
                <h1 class="logo">VAULT 96<br>CO.</h1>
                <nav class="top-nav">
                    <a href="products.html">shop</a>
                    <a href="about.html">about us</a>
                    <a href="contact.html" class="active">contact us</a>
                    <a href="custom-order.html">custom order form</a>
                </nav>
            </div>

            <p class="page-label">contact us</p>

            <section class="content-card">
                <h2>Contact Us Here!</h2>
                <p>Questions about products, orders, or custom pieces? Send us a message below.</p>

                <form class="form-stack">
                    <div class="two-column">
                        <div class="form-group">
                            <label for="first-name">First Name</label>
                            <input type="text" id="first-name" name="first-name" placeholder="Your first name">
                        </div>

                        <div class="form-group">
                            <label for="last-name">Last Name</label>
                            <input type="text" id="last-name" name="last-name" placeholder="Your last name">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Your email">
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" placeholder="Write your message here..."></textarea>
                    </div>

                    <div class="button-row" style="justify-content: flex-start;">
                        <button type="submit" class="main-btn">Submit</button>
                    </div>
                </form>
            </section>
        </section>
    </main>
</body>
</html>
